# Production compose: Traefik reverse proxy with Let's Encrypt SSL
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Before running:
# 1. cp .env.example .env
# 2. Set in .env:
#    - SECRET_KEY (strong random string)
#    - APP_DOMAIN (your domain, e.g., emf-hunt.example.com)
#    - ACME_EMAIL (for Let's Encrypt renewal notices)
#    - EMAIL_BACKEND=api and EMAIL_API_URL / EMAIL_API_KEY
# 3. Ensure DNS points to your server and ports 80/443 are open

services:
  traefik:
    image: traefik:v3.0
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik-data:/traefik
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/traefik/acme.json"
    restart: unless-stopped
    networks:
      - hunt-net

  web:
    image: ghcr.io/pathcipher/emf-hunt:latest
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "sqlite:////app/instance/emf_hunt.db"
      BASE_URL: "https://${APP_DOMAIN}"
      SESSION_COOKIE_SECURE: "true"
      SEED_DEMO: "0"
    volumes:
      - hunt-data:/app/instance
    restart: unless-stopped
    networks:
      - hunt-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.emf-hunt.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.emf-hunt.entrypoints=websecure"
      - "traefik.http.routers.emf-hunt.tls.certresolver=letsencrypt"
      - "traefik.http.services.emf-hunt.loadbalancer.server.port=8000"

  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup
    restart: unless-stopped

volumes:
  hunt-data:
  traefik-data:

networks:
  hunt-net:
    driver: bridge
