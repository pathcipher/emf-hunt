# Semantic version computed from git history + Conventional Commits.
# Bump rules match the commit prefixes used in this repo. ContinuousDeployment
# increments the version on every mainline commit, so no per-build tag is needed.
#
# Computed in CI (gittools/actions, GitVersion 5.x) and injected into the image
# as APP_VERSION (shown in the site footer). Run `dotnet-gitversion` locally to
# preview. Regexes are single-quoted to keep backslashes literal in YAML.
mode: ContinuousDeployment
major-version-bump-message: '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([\w\s-,/\\]*\))?(!:|:.*\n\n((.+\n)+\n)?BREAKING CHANGE:\s.+)'
minor-version-bump-message: '^(feat)(\([\w\s-,/\\]*\))?:'
patch-version-bump-message: '^(fix|perf)(\([\w\s-,/\\]*\))?:'
